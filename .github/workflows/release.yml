name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Tauri Build
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run tauri:build

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE 'src-tauri/target/release/bundle'
          Write-Host "Bundle root: $bundleRoot"

          $msi  = Get-ChildItem -Path "$bundleRoot/msi"  -Filter '*.msi'      -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $msiSig = Get-ChildItem -Path "$bundleRoot/msi"  -Filter '*.msi.sig'  -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe  = Get-ChildItem -Path "$bundleRoot/nsis" -Filter '*-setup.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $exeSig = Get-ChildItem -Path "$bundleRoot/nsis" -Filter '*-setup.exe.sig' -File -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $msi -or -not $msiSig) {
            Write-Host "Inhalt von $bundleRoot :"
            Get-ChildItem $bundleRoot -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Error "MSI oder MSI-Signatur nicht gefunden."
            exit 1
          }

          $signature = (Get-Content $msiSig.FullName -Raw).Trim()
          $version   = "${{ github.ref_name }}".TrimStart('v')
          $msiName   = $msi.Name
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" + [uri]::EscapeDataString($msiName)

          $latest = [ordered]@{
            version   = $version
            notes     = "Flowtime Tagesprotokoll $version"
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $latestPath = Join-Path $env:RUNNER_TEMP 'latest.json'
          $latest | ConvertTo-Json -Depth 5 | Set-Content -Path $latestPath -Encoding UTF8

          # Stage all assets in a single folder for upload
          $stage = Join-Path $env:RUNNER_TEMP 'release-assets'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item $msi.FullName    $stage
          Copy-Item $msiSig.FullName $stage
          if ($exe)    { Copy-Item $exe.FullName    $stage }
          if ($exeSig) { Copy-Item $exeSig.FullName $stage }
          Copy-Item $latestPath $stage

          Write-Host "Staged release assets:"
          Get-ChildItem $stage | Select-Object Name, Length | Format-Table

          # Output stage path for the next step
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create / update GitHub Release with all assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag   = "${{ github.ref_name }}"
          $stage = "${{ steps.artifacts.outputs.stage }}"
          $title = "Flowtime Tagesprotokoll $tag"
          $body  = @"
          Automatisch gebaut von GitHub Actions.

          **Installation:** ``.msi``-Datei runterladen und ausführen.
          **Update:** Bestehende Installationen aktualisieren sich automatisch beim nächsten Start (``latest.json`` Endpoint).
          "@

          # Erstelle Release falls nicht da, sonst überschreiben wir Assets via --clobber
          $exists = $true
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) { $exists = $false }

          if (-not $exists) {
            gh release create $tag --repo "${{ github.repository }}" --title $title --notes $body
          } else {
            gh release edit $tag --repo "${{ github.repository }}" --title $title --notes $body
          }

          $files = Get-ChildItem $stage -File
          gh release upload $tag --repo "${{ github.repository }}" --clobber @($files.FullName)
          Write-Host "Hochgeladen: $($files.Name -join ', ')"
