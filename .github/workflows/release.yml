name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flowtime Tagesprotokoll ${{ github.ref_name }}'
          releaseBody: |
            Automatisch gebaut von GitHub Actions.

            **Installation:** `.msi`-Datei runterladen und ausführen.
            **Update:** Bestehende Installationen aktualisieren sich automatisch beim nächsten Start.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false

      - name: Build latest.json manually (workaround for tauri-action upload skip)
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          $msiPath = Get-ChildItem -Path "$bundleDir/msi" -Filter "*.msi" | Select-Object -First 1
          $sigPath = Get-ChildItem -Path "$bundleDir/msi" -Filter "*.msi.sig" | Select-Object -First 1
          if (-not $msiPath -or -not $sigPath) {
            Write-Error "Konnte .msi oder .sig nicht finden"
            exit 1
          }
          $signature = Get-Content $sigPath.FullName -Raw
          $version = "${{ github.ref_name }}".TrimStart('v')
          $msiName = $msiPath.Name
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$([uri]::EscapeUriString($msiName))"
          $latestJson = @{
            version = $version
            notes = "Flowtime Tagesprotokoll $version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5
          $latestJson | Set-Content -Path latest.json -Encoding UTF8
          Get-Content latest.json
          gh release upload "${{ github.ref_name }}" latest.json --repo "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
