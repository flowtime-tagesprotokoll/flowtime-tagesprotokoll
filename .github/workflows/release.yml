name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build with Tauri Action (erzeugt msi + .sig + lädt msi hoch)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flowtime Tagesprotokoll ${{ github.ref_name }}'
          releaseBody: |
            Automatisch gebaut von GitHub Actions.

            **Installation:** `.msi`-Datei runterladen und ausführen.
            **Update:** Bestehende Installationen aktualisieren sich automatisch beim nächsten Start.
          releaseDraft: false
          prerelease: false

      - name: Latest.json + Updater-ZIP uploaden
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tauri 2 erzeugt fuer den Updater eine .msi.zip + .msi.zip.sig
          # (createUpdaterArtifacts: true). DAS muss latest.json referenzieren —
          # nicht die .msi direkt, sonst kann der Updater nichts entpacken.
          Write-Host "Suche nach .msi.zip Artefakten ..."
          $zipSig = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter '*.msi.zip.sig' -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch 'node_modules' } | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $zipSig) {
            Write-Host "Suche fortgesetzt unter D: ..."
            $zipSig = Get-ChildItem -Path 'D:\' -Recurse -Filter '*.msi.zip.sig' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }

          if (-not $zipSig) {
            Write-Error "Konnte .msi.zip.sig nicht finden. Updater-Signatur wurde nicht erzeugt."
            exit 1
          }

          $zipPath = $zipSig.FullName -replace '\.sig$', ''
          if (-not (Test-Path $zipPath)) {
            Write-Error "Zugehoerige .msi.zip nicht gefunden: $zipPath"
            exit 1
          }
          $zip = Get-Item $zipPath
          Write-Host "Updater-Zip: $($zip.FullName) ($([math]::Round($zip.Length/1MB,2)) MB)"

          $signature = (Get-Content $zipSig.FullName -Raw).Trim()
          $version   = "${{ github.ref_name }}".TrimStart('v')
          $zipName   = $zip.Name
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" + [uri]::EscapeDataString($zipName)

          $latest = [ordered]@{
            version   = $version
            notes     = "Flowtime Tagesprotokoll $version"
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          }
          $latestPath = Join-Path $env:RUNNER_TEMP 'latest.json'
          $latest | ConvertTo-Json -Depth 5 | Set-Content -Path $latestPath -Encoding UTF8

          Write-Host "===== latest.json ====="
          Get-Content $latestPath
          Write-Host "======================="

          gh release upload "${{ github.ref_name }}" "$latestPath" --repo "${{ github.repository }}" --clobber
          gh release upload "${{ github.ref_name }}" "$($zip.FullName)" --repo "${{ github.repository }}" --clobber
          gh release upload "${{ github.ref_name }}" "$($zipSig.FullName)" --repo "${{ github.repository }}" --clobber
          Write-Host "OK: latest.json + .msi.zip + .sig hochgeladen."
