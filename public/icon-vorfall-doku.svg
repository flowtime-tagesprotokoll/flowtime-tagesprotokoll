<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4ff00"/>
      <stop offset="1" stop-color="#a3d100"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect x="0" y="0" width="512" height="512" rx="88" ry="88" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="82" ry="82" fill="none" stroke="url(#accent)" stroke-width="8"/>

  <!-- Warnzeichen zentral oben -->
  <g transform="translate(256 160)" filter="url(#glow)">
    <path d="M 0 -78 L 82 62 L -82 62 Z"
          fill="#f87171" stroke="#fca5a5" stroke-width="4"
          stroke-linejoin="round"/>
    <rect x="-9" y="-40" width="18" height="60" rx="4" fill="#0a0a0a"/>
    <circle cx="0" cy="42" r="10" fill="#0a0a0a"/>
  </g>

  <!-- Text "VORFALL" -->
  <text x="256" y="342"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial Black', 'Helvetica', sans-serif"
        font-weight="900"
        font-size="72"
        letter-spacing="4"
        fill="#ffffff">VORFALL</text>

  <!-- Text "DOKU" -->
  <text x="256" y="422"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial Black', 'Helvetica', sans-serif"
        font-weight="900"
        font-size="86"
        letter-spacing="10"
        fill="url(#accent)">DOKU</text>

  <!-- Kleiner Untertitel -->
  <text x="256" y="470"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-weight="600"
        font-size="20"
        letter-spacing="4"
        fill="#888888">FLOWTIME · GLÜSTV / GWG</text>
</svg>
